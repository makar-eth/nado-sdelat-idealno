<!doctype html>
<html lang="en">
  <head>
    <!-- Кодировка страницы -->
    <meta charset="utf-8" />
    <!-- Настройка масштабирования страницы -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Заголовок и описание страницы -->
    <title>Надо сделать идеально</title>
    <meta name="description" content="" />

    <!-- Подключение иконок. PNG 512x512, ICO 32x32. -->
    <link rel="icon" href="./images/icon.ico" sizes="any" />
    <link rel="icon" href="./images/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./images/apple-touch-icon.png" />

    <!-- Отображение ссылки на сайт в социальных сетях через OpenGraph -->
    <meta property="og:title" content="Надо сделать идеально" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="./images/og.jpg" />
    <!-- Отображение карточкой в твиттере -->
    <meta property="twitter:card" content="summary_large_image" />
  </head>
